<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object Detection & Tracking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }

        .upload-area {
            border: 3px dashed #4361ee;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            background: rgba(67, 97, 238, 0.05);
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            background: rgba(67, 97, 238, 0.1);
            transform: translateY(-2px);
        }

        .upload-area i {
            font-size: 60px;
            color: #4361ee;
            margin-bottom: 15px;
        }

        .video-container {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background: #000;
            margin-top: 20px;
            display: none;
        }

        .video-container video {
            width: 100%;
            height: auto;
            display: block;
        }

        .video-container canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .loading {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
            border-radius: 15px;
        }

        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #4361ee;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats {
            background: linear-gradient(135deg, #4361ee, #764ba2);
            color: white;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }

        .badge {
            background: #4361ee;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin: 2px;
            display: inline-block;
        }

        .btn-custom {
            background: #4361ee;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.3);
            color: white;
        }

        .btn-custom:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="text-center text-white mb-4">
            <h1 class="display-4 fw-bold">
                <i class="fas  me-3"></i>Object Detection & Tracking
            </h1>
            <p class="lead">Upload video - See real-time detection with tracking IDs</p>
        </div>

        <!-- Main Card -->
        <div class="card">
            <!-- Upload Area -->
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('videoInput').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <h3>Upload Video</h3>
                <p class="text-muted">Click to browse or drag and drop</p>
                <input type="file" id="videoInput" accept="video/*" style="display: none;">
                <small class="text-muted">Supported: MP4, AVI, MOV, MKV</small>
            </div>

            <!-- Video Container -->
            <div class="video-container" id="videoContainer">
                <video id="videoPlayer" controls>
                    <source src="" id="videoSource">
                </video>
                <canvas id="detectionCanvas"></canvas>
                
                <!-- Loading Overlay -->
                <div class="loading" id="loadingOverlay" style="display: none;">
                    <div class="spinner"></div>
                    <h4 class="mt-3">Detecting Objects...</h4>
                    <p id="progressText">Processing frame 0/0</p>
                </div>
            </div>

            <!-- Stats Row -->
            <div class="stats" id="statsPanel" style="display: none;">
                <div class="row text-center">
                    <div class="col-md-3">
                        <h3 id="totalFrames">0</h3>
                        <small>Frames Processed</small>
                    </div>
                    <div class="col-md-3">
                        <h3 id="totalDetections">0</h3>
                        <small>Objects Detected</small>
                    </div>
                    <div class="col-md-3">
                        <h3 id="uniqueObjects">0</h3>
                        <small>Unique IDs</small>
                    </div>
                    <div class="col-md-3">
                        <h3 id="fps">0</h3>
                        <small>FPS</small>
                    </div>
                </div>
            </div>

            <!-- Detected Classes -->
            <div class="mt-3" id="classesList"></div>
        </div>
    </div>

    <!-- TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    
    <script>
        // Global variables
        let videoFile = null;
        let videoElement = document.getElementById('videoPlayer');
        let canvas = document.getElementById('detectionCanvas');
        let ctx = canvas.getContext('2d');
        let model = null;
        let detections = [];
        let trackingData = {};
        let nextTrackId = 1;
        let isProcessing = false;
        let animationFrame = null;

        // Colors for different track IDs
        const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD', '#98D8C8', '#F7DC6F'];

        // Load model on page load
        async function loadModel() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('progressText').innerText = 'Loading AI model...';
            
            try {
                model = await cocoSsd.load();
                console.log('Model loaded');
            } catch (error) {
                console.error('Error loading model:', error);
                alert('Error loading model. Please refresh.');
            }
            
            document.getElementById('loadingOverlay').style.display = 'none';
        }
        loadModel();

        // Handle file upload
        document.getElementById('videoInput').addEventListener('change', function(e) {
            videoFile = e.target.files[0];
            if (videoFile) {
                const url = URL.createObjectURL(videoFile);
                videoElement.src = url;
                videoElement.load();
                
                document.getElementById('videoContainer').style.display = 'block';
                document.getElementById('uploadArea').style.display = 'none';
                
                // Reset
                detections = [];
                trackingData = {};
                nextTrackId = 1;
                
                // Start processing when video is ready
                videoElement.onloadeddata = function() {
                    canvas.width = videoElement.videoWidth;
                    canvas.height = videoElement.videoHeight;
                    startDetection();
                };
            }
        });

        // Drag and drop
        document.getElementById('uploadArea').addEventListener('dragover', (e) => {
            e.preventDefault();
            e.target.style.borderColor = '#28a745';
        });

        document.getElementById('uploadArea').addEventListener('dragleave', (e) => {
            e.preventDefault();
            e.target.style.borderColor = '#4361ee';
        });

        document.getElementById('uploadArea').addEventListener('drop', (e) => {
            e.preventDefault();
            e.target.style.borderColor = '#4361ee';
            
            videoFile = e.dataTransfer.files[0];
            if (videoFile && videoFile.type.startsWith('video/')) {
                const url = URL.createObjectURL(videoFile);
                videoElement.src = url;
                videoElement.load();
                
                document.getElementById('videoContainer').style.display = 'block';
                document.getElementById('uploadArea').style.display = 'none';
                
                videoElement.onloadeddata = function() {
                    canvas.width = videoElement.videoWidth;
                    canvas.height = videoElement.videoHeight;
                    startDetection();
                };
            }
        });

        // Start real-time detection
        async function startDetection() {
            if (!model) {
                alert('Model not ready. Please wait.');
                return;
            }

            isProcessing = true;
            document.getElementById('statsPanel').style.display = 'flex';
            videoElement.play();

            // Process frames in real-time
            async function processFrame() {
                if (!isProcessing) return;

                // Run detection on current frame
                const predictions = await model.detect(videoElement);
                
                // Update tracking
                updateTracking(predictions);
                
                // Draw on canvas
                drawDetections();
                
                // Update stats
                updateStats();
                
                // Continue processing
                animationFrame = requestAnimationFrame(processFrame);
            }

            processFrame();
        }

        // Update tracking with IOU matching
        function updateTracking(predictions) {
            const currentDetections = [];
            
            predictions.forEach(pred => {
                const [x, y, w, h] = pred.bbox;
                const bbox = [x, y, x + w, y + h];
                
                let matched = false;
                
                // Try to match with existing tracks
                for (const [id, track] of Object.entries(trackingData)) {
                    const lastDet = track.detections[track.detections.length - 1];
                    if (lastDet && calculateIOU(lastDet.bbox, bbox) > 0.3) {
                        track.detections.push({
                            class: pred.class,
                            confidence: pred.score,
                            bbox: bbox,
                            time: Date.now()
                        });
                        currentDetections.push({
                            ...pred,
                            trackId: parseInt(id),
                            bbox: bbox
                        });
                        matched = true;
                        break;
                    }
                }
                
                // Create new track
                if (!matched) {
                    trackingData[nextTrackId] = {
                        detections: [{
                            class: pred.class,
                            confidence: pred.score,
                            bbox: bbox,
                            time: Date.now()
                        }],
                        color: colors[nextTrackId % colors.length]
                    };
                    currentDetections.push({
                        ...pred,
                        trackId: nextTrackId,
                        bbox: bbox
                    });
                    nextTrackId++;
                }
            });
            
            detections = currentDetections;
        }

        // Calculate IOU between two boxes
        function calculateIOU(box1, box2) {
            const [x1, y1, x2, y2] = box1;
            const [x3, y3, x4, y4] = box2;
            
            const xi1 = Math.max(x1, x3);
            const yi1 = Math.max(y1, y3);
            const xi2 = Math.min(x2, x4);
            const yi2 = Math.min(y2, y4);
            
            const interArea = Math.max(0, xi2 - xi1) * Math.max(0, yi2 - yi1);
            const box1Area = (x2 - x1) * (y2 - y1);
            const box2Area = (x4 - x3) * (y4 - y3);
            
            return interArea / (box1Area + box2Area - interArea);
        }

        // Draw detections on canvas
        function drawDetections() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
            
            detections.forEach(det => {
                const [x1, y1, x2, y2] = det.bbox;
                const color = trackingData[det.trackId]?.color || '#FF6B6B';
                
                // Draw bounding box
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
                
                // Draw ID badge
                ctx.fillStyle = color;
                ctx.font = 'bold 16px Arial';
                
                // ID label
                const idLabel = `ID: ${det.trackId}`;
                ctx.fillRect(x1, y1 - 30, 70, 25);
                ctx.fillStyle = 'white';
                ctx.fillText(idLabel, x1 + 5, y1 - 10);
                
                // Class label
                ctx.fillStyle = color;
                const classLabel = `${det.class} ${Math.round(det.score * 100)}%`;
                ctx.fillRect(x1, y2, ctx.measureText(classLabel).width + 10, 25);
                ctx.fillStyle = 'white';
                ctx.fillText(classLabel, x1 + 5, y2 + 18);
            });
        }

        // Update statistics
        function updateStats() {
            document.getElementById('totalFrames').innerText = Math.floor(videoElement.currentTime * 30);
            document.getElementById('totalDetections').innerText = detections.length;
            document.getElementById('uniqueObjects').innerText = Object.keys(trackingData).length;
            document.getElementById('fps').innerText = Math.round(videoElement.playbackRate * 30);
            
            // Show detected classes
            const classes = {};
            detections.forEach(d => {
                classes[d.class] = (classes[d.class] || 0) + 1;
            });
            
            let html = '<div class="mt-2">';
            for (const [className, count] of Object.entries(classes)) {
                html += `<span class="badge me-1">${className}: ${count}</span>`;
            }
            html += '</div>';
            document.getElementById('classesList').innerHTML = html;
        }

        // Clean up on page unload
        window.addEventListener('beforeunload', function() {
            isProcessing = false;
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
            }
        });
    </script>
</body>
</html>
